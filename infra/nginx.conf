# Loom — nginx reverse proxy (port 80)
#
# Routes:
#   /v1/*    → loom-gateway :8080  (OpenAI-compatible API)
#   /api/*   → loom-gateway :8080  (admin + connector API)
#   /health  → loom-gateway :8080
#   /*       → loom-web :5173      (Vite dev) or static files (prod)
#
# Dev mode:
#   nginx proxies / to Vite dev server (HMR via WebSocket also proxied)
#
# Prod mode (comment dev section, uncomment prod section):
#   nginx serves the built dist/ directory directly and proxies API calls

worker_processes auto;
error_log /usr/local/var/log/nginx/loom-error.log warn;
pid       /usr/local/var/run/nginx/loom.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # Upstream definitions
    upstream loom_gateway {
        server 127.0.0.1:8080;
    }

    upstream loom_web_dev {
        server 127.0.0.1:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # ── API routes → gateway ─────────────────────────────────────────
        location /v1/ {
            proxy_pass         http://loom_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE / streaming support
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
        }

        location /api/ {
            proxy_pass         http://loom_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /health {
            proxy_pass         http://loom_gateway;
            proxy_http_version 1.1;
        }

        # ── DEV: proxy everything else to Vite (including HMR WebSocket) ─
        location / {
            proxy_pass         http://loom_web_dev;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ── PROD: serve built static files ───────────────────────────────
        # Uncomment this block and comment the dev block above for production.
        #
        # root /path/to/Loom/loom/web/dist;
        # index index.html;
        # location / {
        #     try_files $uri $uri/ /index.html;
        # }
    }
}
